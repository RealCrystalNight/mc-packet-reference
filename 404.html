<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Packet Not Found | Minecraft 1.8.9 Packet Reference</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/mc-packet-reference/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
<style>body{font-family:system-ui,sans-serif}</style>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-primary)">
<div style="text-align:center;max-width:480px;padding:40px">
  <h1 style="font-size:4rem;font-weight:700;color:var(--text-muted);line-height:1">404</h1>
  <h2 style="font-size:1.2rem;font-weight:600;margin:16px 0 8px;color:var(--text-primary)" id="msg">Packet Not Found</h2>
  <p style="font-size:0.9rem;color:var(--text-secondary);line-height:1.6;margin-bottom:24px" id="desc">The packet or page you're looking for doesn't exist. Try searching from the home page.</p>
  <a href="/mc-packet-reference/" style="display:inline-block;background:var(--accent);color:#fff;padding:10px 24px;border-radius:6px;text-decoration:none;font-size:0.85rem;font-weight:500">← Back to Packet Reference</a>
</div>
<script>
(function(){
  var path = window.location.pathname;
  // Match /mc-packet-reference/SOMETHING (but NOT /mc-packet-reference/packets/...)
  var m = path.match(/^\/mc-packet-reference\/([CS]\d+[A-Za-z]+)\/?$/);
  if (m) {
    var id = m[1];
    var url = '/mc-packet-reference/packets/' + id + '/';
    document.getElementById('msg').textContent = 'Redirecting...';
    document.getElementById('desc').textContent = 'Taking you to the packet page for ' + id;
    window.location.replace(url);
  }
})();
</script>
</body>
</html>
